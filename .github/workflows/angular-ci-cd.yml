name: Angular CI/CD

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./myHomeTown

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js 24
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: 'myHomeTown/package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Build Angular app
        run: npm run build -- --configuration=production --base-href="/myHomeTown/"

      - name: Run tests
        run: npm run test -- --watch=false --browsers=chromium

      - name: Upload build artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: myHomeTown/dist/myHomeTown/browser

  deploy:
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5